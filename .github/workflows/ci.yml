name: Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: pipelines
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: pipelines
        env:
          # Transform-layer tests build DataFrames by hand and never
          # touch a real database, MinIO, or MongoDB -- but config.py
          # still requires every environment variable to be present the
          # moment it is imported. These are dummy values that satisfy
          # that requirement without needing live infrastructure in CI.
          SOURCE_POSTGRES_HOST: localhost
          SOURCE_POSTGRES_PORT: "5433"
          SOURCE_POSTGRES_DB: shopsphere
          SOURCE_POSTGRES_USER: shopsphere_user
          SOURCE_POSTGRES_PASSWORD: shopsphere_password
          MONGODB_URI: mongodb://localhost:27018/shopsphere_events
          MONGODB_DATABASE: shopsphere_events
          MOCK_API_BASE_URL: http://localhost:8000
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin123
          MINIO_SECURE: "false"
          MINIO_BUCKET: shopsphere-lake
          WAREHOUSE_POSTGRES_HOST: localhost
          WAREHOUSE_POSTGRES_PORT: "5434"
          WAREHOUSE_POSTGRES_DB: shopsphere_warehouse
          WAREHOUSE_POSTGRES_USER: warehouse_user
          WAREHOUSE_POSTGRES_PASSWORD: warehouse_password
        run: |
          python -m pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build pipeline image
        working-directory: pipelines
        run: docker build -t shopsphere-pipelines:ci .
